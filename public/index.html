<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Million CheckBoxes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Checkboxes</h1>
    <div id="container"></div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
      const socket = io();
      const container = document.getElementById("container");
      const CHECKBOX_COUNT = 100;

      socket.on("server:checkbox:change", (data) => {
        console.log("server:checkbox:change event", data);
        const { checked, index } = data;

        const input = document.getElementById(`checkbox-${index}`);
        if (input) {
          input.checked = checked;
        }
      });

      window.addEventListener("load", async (event) => {
        const response = await fetch("/checkbox", { method: "GET" });
        const data = await response.json();

        if (data && data.checkboxes) {
          data.checkboxes.forEach((serverValue, index) => {

            const inputCheckBox = document.createElement("input");

            inputCheckBox.type = "checkbox";
            inputCheckBox.id = `checkbox-${index}`;
            inputCheckBox.checked = serverValue

            inputCheckBox.addEventListener("change", (event) => {
              const checked = event.target.checked;
              console.log("CheckBox Changed:", { index, checked });
              socket.emit("clint:checkbox:change", { index, checked });
            });
            container.appendChild(inputCheckBox);      

          });
        }
      });
    </script>
  </body>
</html>
